apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: postgres.kdb.io
spec:
  group: kdb.io
  names:
    kind: Postgres
    plural: postgres
    singular: postgres
    shortNames:
      - pg
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [domain, user, password, storage]
              properties:
                domain:
                  type: string
                  description: HostSNI hostname for TCP routing
                user:
                  type: string
                  description: POSTGRES_USER
                password:
                  type: string
                  description: POSTGRES_PASSWORD
                image:
                  type: string
                  description: Docker image (default postgres:16)
                storage:
                  type: object
                  required: [pvcName, size, storageClass, accessModes]
                  properties:
                    pvcName:
                      type: string
                      description: Name of the PersistentVolumeClaim
                    size:
                      type: string
                      description: Storage size (e.g. 1Gi)
                    storageClass:
                      type: string
                      description: StorageClass name
                    accessModes:
                      type: array
                      items:
                        type: string
                        enum: [ReadWriteOnce, ReadOnlyMany, ReadWriteMany, ReadWriteOncePod]
                      description: PVC access modes
                    mountPath:
                      type: string
                      description: Mount path in container (default /var/lib/postgresql/data)
            status:
              type: object
              properties:
                phase:
                  type: string
      additionalPrinterColumns:
        - name: Domain
          type: string
          jsonPath: .spec.domain
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
