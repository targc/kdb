apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: redis.kdb.io
spec:
  group: kdb.io
  names:
    kind: Redis
    plural: redis
    singular: redis
    shortNames:
      - rd
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
                  description: HostSNI hostname for TCP routing
                password:
                  type: string
                  description: Redis requirepass (optional)
                image:
                  type: string
                  description: Docker image (default redis:8)
            status:
              type: object
              properties:
                phase:
                  type: string
      additionalPrinterColumns:
        - name: Domain
          type: string
          jsonPath: .spec.domain
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
