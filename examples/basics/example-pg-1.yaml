---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: example-pg-1-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: postgres-tls
  namespace: default
spec:
  alpnProtocols:
    - postgresql

---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: example-pg-1
  namespace: default
spec:
  entryPoints:
    - tcp
  routes:
    - match: HostSNI(`test-pg-1.tcplb.nortezh.com`)
      services:
        - name: example-pg-1
          port: 5432
  tls:
    secretName: tls-cert
    options:
      name: postgres-tls
      namespace: default

---
apiVersion: v1
kind: Service
metadata:
  name: example-pg-1
  namespace: default
spec:
  selector:
    app: example-pg-1
  ports:
    - name: app
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-pg-1
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-pg-1
  template:
    metadata:
      labels:
        app: example-pg-1
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: example-pg-1-data
